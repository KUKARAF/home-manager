name: Update package sources

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run nvfetcher
        run: nix run .#update -- -c nvfetcher.toml

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update package sources"
          title: "chore: update package sources"
          body: |
            Automated weekly update of `_sources.nix` via nvfetcher.

            Check which packages changed before merging.
          branch: auto/update-sources
          delete-branch: true
